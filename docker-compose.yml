version: '3.9'

services:
  mfn-system:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mfn-production
    hostname: mfn-system
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

    # Port mappings
    ports:
      - "8080:8080"   # API Gateway
      - "8081:8081"   # WebSocket Gateway
      - "8082:8082"   # gRPC Gateway
      - "9090:9090"   # Prometheus Metrics
      - "3000:3000"   # Dashboard UI

    # Environment variables
    environment:
      - MFN_ENV=production
      - MFN_LOG_LEVEL=info
      - MFN_DATA_DIR=/app/data
      - MFN_LOG_DIR=/app/logs
      - MFN_SOCKET_DIR=/app/sockets
      - MFN_BACKUP_DIR=/app/backups
      - MFN_CONFIG_DIR=/app/config
      - MFN_API_PORT=8080
      - MFN_DASHBOARD_PORT=3000
      - PYTHONUNBUFFERED=1

    # Volume mounts
    volumes:
      - mfn-data:/app/data
      - mfn-logs:/app/logs
      - mfn-backups:/app/backups
      - ./config:/app/config:ro

    # Health check
    healthcheck:
      test: ["CMD", "/app/scripts/health_check.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Networking
    networks:
      - mfn-network

    # Security options
    security_opt:
      - no-new-privileges:true

    # Capabilities
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SYS_TIME

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=mfn,env=production"

  # Optional: Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: mfn-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - mfn-network
    depends_on:
      - mfn-system

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: mfn-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - ./docker/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    networks:
      - mfn-network
    depends_on:
      - prometheus

volumes:
  mfn-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

  mfn-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs

  mfn-backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./backups

  prometheus-data:
    driver: local

  grafana-data:
    driver: local

networks:
  mfn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16