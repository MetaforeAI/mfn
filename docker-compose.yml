services:
  memflow:
    build: .
    container_name: memflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - memflow-data:/data/mfn/memory
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Optional monitoring (uncomment to enable) ---
