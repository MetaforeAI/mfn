[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:layer1]
command=/app/bin/ifr_socket_server
environment=SOCKET_PATH="/tmp/mfn_test_layer1.sock",MFN_DATA_DIR="/data/mfn/memory"
autostart=true
autorestart=true
startretries=5
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:layer2]
command=/app/bin/layer2_socket_server
environment=SOCKET_PATH="/tmp/mfn_test_layer2.sock",MFN_DATA_DIR="/data/mfn/memory",RUST_LOG="info"
autostart=true
autorestart=true
startretries=5
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

