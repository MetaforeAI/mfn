# Prometheus Configuration for MFN System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    system: 'mfn'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # MFN API Gateway metrics
  - job_name: 'mfn-api'
    static_configs:
      - targets: ['mfn-system:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # MFN System metrics (custom exporter)
  - job_name: 'mfn-system'
    static_configs:
      - targets: ['mfn-system:9090']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Docker container metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['mfn-system:9323']
    metrics_path: '/metrics'

  # Node exporter for host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

